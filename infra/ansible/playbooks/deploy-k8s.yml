---
- name: Aplicacao dos manifests Kubernetes no cluster AKS
  hosts: localhost
  connection: local

  vars:
    k8s_namespace: casa-church
    gateway_public_ip: ""
    project_root: "{{ playbook_dir }}/../../.."
    manifest_dir: "{{ project_root }}/infra/kubernetes"
    ingress_nginx_manifest_url: https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/cloud/deploy.yaml

  tasks:
    - name: Verificar acesso ao AKS
      shell: kubectl get nodes

    - name: Verificar se o Secret da API existe
      stat:
        path: "{{ manifest_dir }}/secret.yaml"
      register: secret_file

    - name: Falhar se o Secret da API nao existir
      fail:
        msg: "Crie {{ manifest_dir }}/secret.yaml a partir de secret.example.yaml antes do deploy."
      when: not secret_file.stat.exists

    - name: Instalar Ingress Controller Nginx
      shell: kubectl apply -f "{{ ingress_nginx_manifest_url }}"

    - name: Aguardar Ingress Controller Nginx
      shell: kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=180s

    - name: Validar IP publico do Gateway
      fail:
        msg: "Informe gateway_public_ip usando -e para restringir o Ingress Controller ao Gateway Nginx."
      when: gateway_public_ip | length == 0

    - name: Restringir Ingress Controller ao Gateway Nginx da VM
      shell: >
        kubectl patch svc ingress-nginx-controller -n ingress-nginx --type merge
        -p '{"spec":{"loadBalancerSourceRanges":["{{ gateway_public_ip }}/32"]}}'

    - name: Aplicar Namespace
      shell: kubectl apply -f "{{ manifest_dir }}/namespace.yaml"

    - name: Aplicar ResourceQuota
      shell: kubectl apply -f "{{ manifest_dir }}/resource-quota.yaml"

    - name: Aplicar LimitRange
      shell: kubectl apply -f "{{ manifest_dir }}/limit-range.yaml"

    - name: Aplicar manifests do banco PostgreSQL
      shell: kubectl apply -f "{{ manifest_dir }}/database"

    - name: Aguardar PostgreSQL primario ficar pronto
      shell: kubectl rollout status statefulset/casa-church-postgres-primary -n "{{ k8s_namespace }}" --timeout=240s

    - name: Aguardar replicas de leitura do PostgreSQL ficarem prontas
      shell: kubectl rollout status statefulset/casa-church-postgres-read -n "{{ k8s_namespace }}" --timeout=240s

    - name: Aplicar ConfigMap da API
      shell: kubectl apply -f "{{ manifest_dir }}/configmap.yaml"

    - name: Aplicar Secret da API
      shell: kubectl apply -f "{{ manifest_dir }}/secret.yaml"

    - name: Aplicar Deployment da API
      shell: kubectl apply -f "{{ manifest_dir }}/deployment.yaml"

    - name: Aplicar Service da API
      shell: kubectl apply -f "{{ manifest_dir }}/service.yaml"

    - name: Aplicar Ingress da API
      shell: kubectl apply -f "{{ manifest_dir }}/ingress.yaml"

    - name: Aplicar HPA da API
      shell: kubectl apply -f "{{ manifest_dir }}/hpa.yaml"

    - name: Reiniciar pods da API para baixar a imagem mais recente
      shell: kubectl rollout restart deployment/casa-church-api -n "{{ k8s_namespace }}"

    - name: Aguardar reinicio da API
      shell: sleep 60

    - name: Verificar pods do namespace
      shell: kubectl get pods -n "{{ k8s_namespace }}"
      register: pods_result

    - name: Exibir pods criados
      debug:
        var: pods_result.stdout_lines

    - name: Verificar services do namespace
      shell: kubectl get svc -n "{{ k8s_namespace }}"
      register: services_result

    - name: Exibir services criados
      debug:
        var: services_result.stdout_lines

    - name: Verificar HPA da API
      shell: kubectl get hpa -n "{{ k8s_namespace }}"
      register: hpa_result

    - name: Exibir HPA criado
      debug:
        var: hpa_result.stdout_lines

    - name: Verificar ingress da API
      shell: kubectl get ingress -n "{{ k8s_namespace }}"
      register: ingress_result

    - name: Exibir ingress criado
      debug:
        var: ingress_result.stdout_lines

    - name: Verificar endpoint publico do Ingress Controller
      shell: kubectl get svc ingress-nginx-controller -n ingress-nginx
      register: ingress_controller_result

    - name: Exibir endpoint publico do Ingress Controller
      debug:
        var: ingress_controller_result.stdout_lines

    - name: Validar health check da API no AKS
      shell: kubectl run curl-test -n default --rm -i --image=curlimages/curl --restart=Never -- curl -s http://casa-church-api-service.{{ k8s_namespace }}.svc.cluster.local/health
      register: api_health_result

    - name: Exibir resultado do health check
      debug:
        var: api_health_result.stdout_lines
