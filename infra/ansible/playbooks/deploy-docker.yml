---
- name: Deploy do frontend e gateway Nginx na VM da Azure
  hosts: frontend
  become: true

  vars:
    frontend_image: "{{ acr_login_server }}/casa-church-frontend:dev"
    frontend_container_name: casa-church-frontend
    frontend_port: 8080
    gateway_site_name: casa-church-gateway

  tasks:
    - name: Validar variaveis obrigatorias
      fail:
        msg: "Informe acr_name, acr_login_server e api_backend_url usando -e."
      when: acr_name is not defined or acr_login_server is not defined or api_backend_url is not defined

    - name: Atualizar pacotes do sistema
      apt:
        update_cache: yes

    - name: Instalar dependencias necessarias
      apt:
        name:
          - docker.io
          - nginx
          - curl
          - ca-certificates
        state: present

    - name: Garantir que o Docker esta ativo
      service:
        name: docker
        state: started
        enabled: yes

    - name: Garantir que o Nginx esta ativo
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Instalar Azure CLI
      shell: |
        if ! command -v az >/dev/null 2>&1; then
          curl -sL https://aka.ms/InstallAzureCLIDeb | bash
        fi
      args:
        executable: /bin/bash

    - name: Autenticar na Azure com a identidade gerenciada da VM
      shell: az login --identity

    - name: Autenticar Docker no Azure Container Registry
      shell: az acr login --name {{ acr_name }}

    - name: Baixar imagem Docker do frontend
      shell: docker pull {{ frontend_image }}

    - name: Remover container antigo do frontend
      shell: docker rm -f {{ frontend_container_name }} || true

    - name: Subir container do frontend
      shell: |
        docker run -d \
          --name {{ frontend_container_name }} \
          --restart unless-stopped \
          -p 127.0.0.1:{{ frontend_port }}:80 \
          {{ frontend_image }}

    - name: Copiar configuracao do Nginx Gateway
      template:
        src: ../../gateway/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ gateway_site_name }}
        mode: "0644"

    - name: Remover site padrao do Nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Habilitar site do Gateway
      file:
        src: /etc/nginx/sites-available/{{ gateway_site_name }}
        dest: /etc/nginx/sites-enabled/{{ gateway_site_name }}
        state: link
        force: yes

    - name: Validar configuracao do Nginx
      shell: nginx -t

    - name: Reiniciar Nginx
      service:
        name: nginx
        state: restarted

    - name: Validar frontend local
      uri:
        url: http://127.0.0.1:{{ frontend_port }}
        status_code: 200

    - name: Validar API via Gateway
      uri:
        url: http://127.0.0.1/api/health
        status_code: 200

    - name: Exibir containers em execucao
      shell: docker ps
      register: containers_result

    - name: Mostrar containers em execucao
      debug:
        var: containers_result.stdout_lines
