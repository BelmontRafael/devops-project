apiVersion: apps/v1
kind: Deployment
metadata:
  name: casa-church-api
  namespace: casa-church
  labels:
    app: casa-church-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: casa-church-api
  template:
    metadata:
      labels:
        app: casa-church-api
    spec:
      containers:
        - name: api
          image: acrcasachurchrafael.azurecr.io/casa-church-backend:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: casa-church-api-config
            - secretRef:
                name: casa-church-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
