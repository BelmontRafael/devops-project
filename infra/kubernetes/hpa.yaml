apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: casa-church-api-hpa
  namespace: casa-church
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: casa-church-api
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
