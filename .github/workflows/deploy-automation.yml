name: Deploy Automation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Testes unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Testar backend
        run: |
          cd backend
          npm ci
          npm test -- --runInBand --cacheDirectory ./.jest-cache

      - name: Testar frontend
        run: |
          cd frontend
          npm ci
          npm test
          npm run build

  build_push:
    name: Build, Trivy e push das imagens
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Criar arquivo .env e carregar variaveis
        run: |
          printf '%s\n' "${{ secrets.DEPLOY_ENV }}" > .env
          source .env

          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE_NAME=$BACKEND_IMAGE_NAME" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE_NAME=$FRONTEND_IMAGE_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Login no ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "$ACR_LOGIN_SERVER" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Build imagem do backend
        run: |
          docker build \
            -t casa-church-backend:${{ github.sha }} \
            -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$IMAGE_TAG" \
            ./backend

      - name: SAST com Trivy na imagem do backend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: casa-church-backend:${{ github.sha }}
          format: table
          scanners: vuln
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push imagem do backend
        run: |
          docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:$IMAGE_TAG"

      - name: Build e push imagem do frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$IMAGE_TAG" \
            ./frontend
          docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:$IMAGE_TAG"

  deploy:
    name: Deploy no AKS, frontend e gateway
    runs-on: ubuntu-latest
    needs: build_push
    env:
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
      ANSIBLE_HOST_KEY_CHECKING: "False"

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Criar arquivo .env e carregar variaveis
        run: |
          printf '%s\n' "${{ secrets.DEPLOY_ENV }}" > .env
          source .env

          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE_NAME=$BACKEND_IMAGE_NAME" >> "$GITHUB_ENV"
          echo "FRONTEND_VM_PUBLIC_IP=$FRONTEND_VM_PUBLIC_IP" >> "$GITHUB_ENV"
          echo "FRONTEND_VM_USER=$FRONTEND_VM_USER" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Instalar ferramentas
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4

      - name: Configurar kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl get nodes

      - name: Preparar Secret do Kubernetes
        run: |
          source .env

          cat > infra/kubernetes/secret.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: casa-church-api-secret
            namespace: casa-church
          type: Opaque
          stringData:
            PGPASSWORD: |-
              ${POSTGRESQL_ADMIN_PASSWORD}
            JWT_SECRET: |-
              ${JWT_SECRET}
          EOF

          sed -i "s|image: .*casa-church-backend:.*|image: ${ACR_LOGIN_SERVER}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}|" infra/kubernetes/deployment.yaml

      - name: Deploy no AKS
        run: |
          ansible-playbook infra/ansible/playbooks/deploy-k8s.yml \
            -e "gateway_public_ip=$FRONTEND_VM_PUBLIC_IP"

      - name: Obter IP publico do Ingress Controller
        run: |
          INGRESS_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          if [ -z "$INGRESS_IP" ]; then
            echo "Nao foi possivel obter o IP publico do Ingress Controller."
            exit 1
          fi

          echo "INGRESS_IP=$INGRESS_IP" >> "$GITHUB_ENV"

      - name: Preparar acesso SSH da VM
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.FRONTEND_VM_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

          cat > infra/ansible/hosts.ini <<EOF
          [frontend]
          ${FRONTEND_VM_PUBLIC_IP} ansible_user=${FRONTEND_VM_USER} ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Deploy do frontend e gateway na VM
        run: |
          ansible-playbook \
            -i infra/ansible/hosts.ini \
            infra/ansible/playbooks/deploy-docker.yml \
            -e "acr_name=$ACR_NAME acr_login_server=$ACR_LOGIN_SERVER api_backend_url=http://$INGRESS_IP"

  dast:
    name: DAST com OWASP ZAP
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: OWASP ZAP baseline contra gateway
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.GATEWAY_HOM_URL }}
          allow_issue_writing: false
          fail_action: false

  notify:
    name: Notificacao
    runs-on: ubuntu-latest
    needs: [tests, build_push, deploy, dast]
    if: always()

    steps:
      - name: Exibir resumo da pipeline
        run: |
          echo "Resumo da pipeline:"
          echo "Testes unitarios: ${{ needs.tests.result }}"
          echo "Build, Trivy e push: ${{ needs.build_push.result }}"
          echo "Deploy com Ansible: ${{ needs.deploy.result }}"
          echo "DAST com OWASP ZAP: ${{ needs.dast.result }}"
          echo "Pipeline finalizada."
